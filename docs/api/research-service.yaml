    # ==================== Template Schemas ====================
    TemplateCreate:
      type: object
      required:
        - name
        - query_template
      properties:
        name:
          type: string
          minLength: 3
          maxLength: 100
          description: Template name
          example: "Daily News Analysis"
        description:
          type: string
          nullable: true
          description: Template description
        query_template:
          type: string
          minLength: 10
          maxLength: 2000
          description: |
            Query template with {{variable}} placeholders.

            **Example:** "Analyze news about {{topic}} in the last {{days}} days"
        parameters:
          type: object
          additionalProperties: true
          default: {}
          description: |
            Parameter definitions (name -> type).

            **Example:**
            ```json
            {
              "topic": "string",
              "days": "integer"
            }
            ```
        default_model:
          type: string
          enum: [sonar, sonar-pro, sonar-reasoning-pro]
          default: sonar
        default_depth:
          type: string
          enum: [quick, standard, deep]
          default: standard
        is_public:
          type: boolean
          default: false
          description: Whether template is visible to other users
        research_function:
          type: string
          nullable: true
          description: Optional specialized research function
        function_parameters:
          type: object
          nullable: true
          additionalProperties: true
          description: Default parameters for research function
        output_schema:
          type: object
          nullable: true
          description: Pydantic schema for structured output validation

    TemplateUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 3
          maxLength: 100
          nullable: true
        description:
          type: string
          nullable: true
        query_template:
          type: string
          minLength: 10
          maxLength: 2000
          nullable: true
        parameters:
          type: object
          nullable: true
        default_model:
          type: string
          enum: [sonar, sonar-pro, sonar-reasoning-pro]
          nullable: true
        default_depth:
          type: string
          enum: [quick, standard, deep]
          nullable: true
        is_active:
          type: boolean
          nullable: true
        is_public:
          type: boolean
          nullable: true
        research_function:
          type: string
          nullable: true
        function_parameters:
          type: object
          nullable: true
        output_schema:
          type: object
          nullable: true

    TemplateResponse:
      type: object
      properties:
        id:
          type: integer
        user_id:
          type: integer
        name:
          type: string
        description:
          type: string
          nullable: true
        query_template:
          type: string
        parameters:
          type: object
        default_model:
          type: string
        default_depth:
          type: string
        is_active:
          type: boolean
        is_public:
          type: boolean
        usage_count:
          type: integer
          description: Number of times template has been used
        last_used_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        research_function:
          type: string
          nullable: true
        function_parameters:
          type: object
          nullable: true
        output_schema:
          type: object
          nullable: true

    TemplateApply:
      type: object
      properties:
        variables:
          type: object
          additionalProperties: true
          default: {}
          description: |
            Variable values for template substitution.

            **Example:**
            ```json
            {
              "topic": "artificial intelligence",
              "days": "7"
            }
            ```
        model_name:
          type: string
          enum: [sonar, sonar-pro, sonar-reasoning-pro]
          nullable: true
          description: Override template's default model
        depth:
          type: string
          enum: [quick, standard, deep]
          nullable: true
          description: Override template's default depth
        feed_id:
          type: string
          format: uuid
          nullable: true
        legacy_feed_id:
          type: integer
          nullable: true
        article_id:
          type: string
          format: uuid
          nullable: true
        legacy_article_id:
          type: integer
          nullable: true

    TemplatePreview:
      type: object
      properties:
        template_id:
          type: integer
        variables:
          type: object
          description: Variables used for rendering
        rendered_query:
          type: string
          description: Final query after variable substitution
        estimated_cost:
          type: number
          format: float
          description: Estimated cost in USD

    # ==================== Research Run Schemas ====================
    ResearchRunCreate:
      type: object
      required:
        - template_id
      properties:
        template_id:
          type: integer
          minimum: 1
          description: Template to use for the run
        parameters:
          type: object
          additionalProperties:
            type: string
          default: {}
          description: Template variables
        model_name:
          type: string
          enum: [sonar, sonar-pro, sonar-reasoning-pro]
          nullable: true
          description: Override template's model
        depth:
          type: string
          enum: [quick, standard, deep]
          nullable: true
          description: Override template's depth
        scheduled_at:
          type: string
          format: date-time
          nullable: true
          description: When to execute the run (null = immediate)
        is_recurring:
          type: boolean
          default: false
          description: Whether run repeats automatically
        recurrence_pattern:
          type: string
          enum: [daily, weekly, monthly]
          nullable: true
          description: How often to repeat (if is_recurring=true)
        metadata:
          type: object
          default: {}
          description: Additional metadata for the run

    ResearchRunResponse:
      type: object
      properties:
        id:
          type: integer
        user_id:
          type: integer
        template_id:
          type: integer
        template_name:
          type: string
          description: Name of the template used
        parameters:
          type: object
          additionalProperties:
            type: string
        model_name:
          type: string
        depth:
          type: string
        scheduled_at:
          type: string
          format: date-time
          nullable: true
        is_recurring:
          type: boolean
        recurrence_pattern:
          type: string
          nullable: true
        status:
          type: string
          enum: [pending, running, completed, failed, cancelled]
        started_at:
          type: string
          format: date-time
          nullable: true
        completed_at:
          type: string
          format: date-time
          nullable: true
        tasks_created:
          type: integer
          description: Number of tasks created by this run
        tasks_completed:
          type: integer
          description: Number of tasks successfully completed
        tasks_failed:
          type: integer
          description: Number of tasks that failed
        total_tokens_used:
          type: integer
          description: Total tokens consumed by all tasks
        total_cost:
          type: number
          format: float
          description: Total cost in USD
        results_summary:
          type: object
          nullable: true
          description: Aggregated results from all tasks
        error_message:
          type: string
          nullable: true
        triggered_by:
          type: string
          description: How the run was triggered (manual, scheduled, recurring)
        metadata:
          type: object
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ResearchRunList:
      type: object
      properties:
        runs:
          type: array
          items:
            $ref: '#/components/schemas/ResearchRunResponse'
        total:
          type: integer
        page:
          type: integer
        page_size:
          type: integer
        has_more:
          type: boolean

    ResearchRunStatus:
      type: object
      properties:
        id:
          type: integer
        status:
          type: string
          enum: [pending, running, completed, failed, cancelled]
        progress:
          type: number
          format: float
          minimum: 0
          maximum: 1
          description: Completion percentage (0.0 to 1.0)
        tasks_created:
          type: integer
        tasks_completed:
          type: integer
        tasks_failed:
          type: integer
        total_tokens_used:
          type: integer
        total_cost:
          type: number
          format: float
        error_message:
          type: string
          nullable: true

    # ==================== Error Schemas ====================
    Error:
      type: object
      properties:
        detail:
          type: string
          description: Error message
          example: "Task not found"

  responses:
    Unauthorized:
      description: Authentication required or token invalid
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            detail: "Could not validate credentials"

    BadRequest:
      description: Invalid request (validation error, contract violation)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            detail: "Request contract violation: function_parameters provided but research_function missing"

    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            detail: "Failed to create research task"
