          format: float
          description: Total cost in USD
        feed_id:
          type: string
          format: uuid
          nullable: true
        legacy_feed_id:
          type: integer
          nullable: true
        article_id:
          type: string
          format: uuid
          nullable: true
        legacy_article_id:
          type: integer
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
          nullable: true

    ResearchTaskList:
      type: object
      properties:
        tasks:
          type: array
          items:
            $ref: '#/components/schemas/ResearchTaskResponse'
        total:
