apiVersion: apps/v1
kind: Deployment
metadata:
  name: traefik-gateway
  namespace: news-microservices
  labels:
    app: traefik
    component: gateway
    version: v2.10
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: traefik
      component: gateway
  template:
    metadata:
      labels:
        app: traefik
        component: gateway
        version: v2.10
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8082"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: traefik-ingress-controller
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - traefik
              topologyKey: kubernetes.io/hostname
      containers:
      - name: traefik
        image: traefik:v2.10
        args:
          - --configfile=/config/traefik.yml
          - --api.dashboard=true
          - --api.debug=false
          - --metrics.prometheus=true
          - --metrics.prometheus.entrypoint=metrics
          - --entryPoints.web.address=:80
          - --entryPoints.websecure.address=:443
          - --entryPoints.metrics.address=:8082
          - --providers.file.directory=/config/dynamic
          - --providers.file.watch=true
          - --providers.kubernetes=true
          - --providers.kubernetes.ingressclass=traefik
          - --providers.kubernetes.allowCrossNamespace=false
          - --log.level=INFO
          - --accesslog=true
          - --accesslog.format=json
          - --ping=true
          - --ping.entrypoint=web
        ports:
        - name: web
          containerPort: 80
          protocol: TCP
        - name: websecure
          containerPort: 443
          protocol: TCP
        - name: dashboard
          containerPort: 8080
          protocol: TCP
        - name: metrics
          containerPort: 8082
          protocol: TCP
        env:
        - name: TRAEFIK_LOG_LEVEL
          value: "INFO"
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: traefik-secrets
              key: jwt-secret
        - name: SERVICE_JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: traefik-secrets
              key: service-jwt-secret
        volumeMounts:
        - name: config
          mountPath: /config
          readOnly: true
        - name: dynamic-config
          mountPath: /config/dynamic
          readOnly: true
        - name: certificates
          mountPath: /certs
          readOnly: true
        - name: acme
          mountPath: /acme
        livenessProbe:
          httpGet:
            path: /ping
            port: web
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ping
            port: web
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        resources:
          limits:
            cpu: "1000m"
            memory: "512Mi"
          requests:
            cpu: "100m"
            memory: "128Mi"
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 65534
          capabilities:
            drop:
              - ALL
            add:
              - NET_BIND_SERVICE
      volumes:
      - name: config
        configMap:
          name: traefik-config
      - name: dynamic-config
        configMap:
          name: traefik-dynamic-config
      - name: certificates
        secret:
          secretName: traefik-certificates
          optional: true
      - name: acme
        persistentVolumeClaim:
          claimName: traefik-acme-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: traefik
  namespace: news-microservices
  labels:
    app: traefik
    component: gateway
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"
spec:
  type: LoadBalancer
  selector:
    app: traefik
    component: gateway
  ports:
  - port: 80
    targetPort: web
    name: web
    protocol: TCP
  - port: 443
    targetPort: websecure
    name: websecure
    protocol: TCP
  - port: 8082
    targetPort: metrics
    name: metrics
    protocol: TCP
  sessionAffinity: None

---
apiVersion: v1
kind: Service
metadata:
  name: traefik-dashboard
  namespace: news-microservices
  labels:
    app: traefik
    component: dashboard
spec:
  type: ClusterIP
  selector:
    app: traefik
    component: gateway
  ports:
  - port: 8080
    targetPort: dashboard
    name: dashboard
    protocol: TCP