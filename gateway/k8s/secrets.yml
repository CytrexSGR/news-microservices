apiVersion: v1
kind: Secret
metadata:
  name: traefik-secrets
  namespace: news-microservices
type: Opaque
stringData:
  jwt-secret: "your-jwt-secret-key-here"
  service-jwt-secret: "your-service-jwt-secret-here"
  dashboard-username: "admin"
  dashboard-password: "SecurePass123!"

---
apiVersion: v1
kind: Secret
metadata:
  name: traefik-certificates
  namespace: news-microservices
type: kubernetes.io/tls
data:
  # Base64 encoded certificate and key
  # You can generate these with:
  # cat cert.pem | base64 -w 0
  # cat key.pem | base64 -w 0
  tls.crt: LS0tLS1CRUdJTiBDRVJUSUZJQ0FURS0tLS0tCi4uLgotLS0tLUVORCBDRVJUSUZJQ0FURS0tLS0t
  tls.key: LS0tLS1CRUdJTiBSU0EgUFJJVkFURSBLRVktLS0tLQouLi4KLS0tLS1FTkQgUlNBIFBSSVZBVEUgS0VZLS0tLS0=

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: traefik-acme-pvc
  namespace: news-microservices
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  storageClassName: standard