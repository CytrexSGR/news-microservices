apiVersion: v1
kind: ConfigMap
metadata:
  name: traefik-config
  namespace: news-microservices
data:
  traefik.yml: |
    api:
      dashboard: true
      debug: false

    entryPoints:
      web:
        address: ":80"
        http:
          redirections:
            entryPoint:
              to: websecure
              scheme: https
              permanent: true
      websecure:
        address: ":443"
      metrics:
        address: ":8082"

    providers:
      file:
        directory: /config/dynamic
        watch: true
      kubernetes:
        ingressClass: traefik
        allowCrossNamespace: false
        namespaces:
          - news-microservices

    metrics:
      prometheus:
        entryPoint: metrics
        addEntryPointsLabels: true
        addRoutersLabels: true
        addServicesLabels: true

    log:
      level: INFO
      format: json

    accessLog:
      format: json
      filters:
        statusCodes:
          - "200-299"
          - "400-599"

    ping:
      entryPoint: web

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: traefik-dynamic-config
  namespace: news-microservices
data:
  routes.yml: |
    http:
      routers:
        auth-api:
          rule: "PathPrefix(`/api/v1/auth`)"
          service: auth-service
          middlewares:
            - secure-headers
            - cors
            - rate-limit

        users-api:
          rule: "PathPrefix(`/api/v1/users`)"
          service: auth-service
          middlewares:
            - secure-headers
            - cors
            - rate-limit
            - jwt-auth

        feeds-api:
          rule: "PathPrefix(`/api/v1/feeds`)"
          service: feed-service
          middlewares:
            - secure-headers
            - cors
            - rate-limit
            - jwt-auth

      services:
        auth-service:
          loadBalancer:
            servers:
              - url: "http://auth-service:8000"
            healthCheck:
              path: /health
              interval: 10s
              timeout: 3s

        feed-service:
          loadBalancer:
            servers:
              - url: "http://feed-service:8001"
            healthCheck:
              path: /health
              interval: 10s
              timeout: 3s

  middlewares.yml: |
    http:
      middlewares:
        secure-headers:
          headers:
            frameDeny: true
            browserXssFilter: true
            contentTypeNosniff: true
            forceSTSHeader: true
            stsIncludeSubdomains: true
            stsPreload: true
            stsSeconds: 31536000
            customResponseHeaders:
              X-Content-Type-Options: "nosniff"
              X-Frame-Options: "DENY"
              X-XSS-Protection: "1; mode=block"

        cors:
          headers:
            accessControlAllowMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
              - PATCH
            accessControlAllowHeaders:
              - Authorization
              - Content-Type
              - X-Request-Id
            accessControlAllowOriginList:
              - "http://localhost:3000"
              - "http://localhost:3001"
            accessControlMaxAge: 86400
            accessControlAllowCredentials: true

        rate-limit:
          rateLimit:
            average: 100
            period: 1m
            burst: 200

        jwt-auth:
          forwardAuth:
            address: "http://auth-service:8000/api/v1/auth/validate"
            authResponseHeaders:
              - X-User-Id
              - X-User-Email
              - X-User-Roles
            trustForwardHeader: true