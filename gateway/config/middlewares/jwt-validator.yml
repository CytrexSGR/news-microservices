# JWT Validator Middleware Configuration
# Custom middleware for JWT validation

http:
  middlewares:
    # Standard JWT validation
    jwt-validator:
      plugin:
        jwt:
          # JWT Secret or Public Key
          secret: "${JWT_SECRET}"
          # Or use public key for RS256
          # publicKey: |
          #   -----BEGIN PUBLIC KEY-----
          #   MIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIBCgKCAQEA...
          #   -----END PUBLIC KEY-----

          # Algorithm
          algorithm: "HS256"  # or RS256, ES256, etc.

          # Token location
          tokenLocation: "header"
          tokenName: "Authorization"
          tokenPrefix: "Bearer "

          # Alternative: cookie
          # tokenLocation: "cookie"
          # tokenName: "jwt_token"

          # Claims validation
          requiredClaims:
            - "sub"
            - "exp"
            - "iat"

          # Audience validation
          audience: "news-mcp-api"

          # Issuer validation
          issuer: "news-mcp-auth"

          # Custom claims to forward
          forwardClaims:
            sub: "X-User-Id"
            email: "X-User-Email"
            roles: "X-User-Roles"
            permissions: "X-User-Permissions"

          # Clock skew tolerance
          clockSkew: 60  # seconds

          # Bypass paths (no JWT required)
          bypassPaths:
            - "/health"
            - "/api/v1/auth/login"
            - "/api/v1/auth/register"
            - "/api/v1/auth/refresh"
            - "/api/v1/auth/forgot-password"
            - "/api/docs"

          # Optional: JWKS endpoint for key rotation
          # jwksUrl: "http://auth-service:8000/.well-known/jwks.json"
          # jwksRefreshInterval: 3600  # seconds

          # Error handling
          onError:
            statusCode: 401
            message: "Unauthorized: Invalid or expired token"
            headers:
              WWW-Authenticate: 'Bearer realm="news-mcp-api"'

    # JWT validation with role checking
    jwt-admin:
      plugin:
        jwt:
          secret: "${JWT_SECRET}"
          algorithm: "HS256"
          tokenLocation: "header"
          tokenName: "Authorization"
          tokenPrefix: "Bearer "

          # Role validation
          requiredRoles:
            - "admin"
          rolesClaimName: "roles"

          forwardClaims:
            sub: "X-User-Id"
            email: "X-User-Email"
            roles: "X-User-Roles"

          onError:
            statusCode: 403
            message: "Forbidden: Admin role required"

    # JWT validation for service-to-service communication
    jwt-service:
      plugin:
        jwt:
          secret: "${SERVICE_JWT_SECRET}"
          algorithm: "HS256"
          tokenLocation: "header"
          tokenName: "X-Service-Token"

          requiredClaims:
            - "service_name"
            - "service_id"

          issuer: "news-mcp-gateway"

          forwardClaims:
            service_name: "X-Service-Name"
            service_id: "X-Service-Id"

          onError:
            statusCode: 401
            message: "Unauthorized: Invalid service token"

    # JWT validation with refresh token support
    jwt-with-refresh:
      plugin:
        jwt:
          secret: "${JWT_SECRET}"
          algorithm: "HS256"
          tokenLocation: "header"
          tokenName: "Authorization"
          tokenPrefix: "Bearer "

          # Refresh token configuration
          refreshToken:
            enabled: true
            endpoint: "http://auth-service:8000/api/v1/auth/refresh"
            tokenLocation: "cookie"
            tokenName: "refresh_token"
            autoRefresh: true
            refreshThreshold: 300  # Refresh if token expires in 5 minutes

          forwardClaims:
            sub: "X-User-Id"
            email: "X-User-Email"
            roles: "X-User-Roles"

    # JWT validation with permission checking
    jwt-permission:
      plugin:
        jwt:
          secret: "${JWT_SECRET}"
          algorithm: "HS256"
          tokenLocation: "header"
          tokenName: "Authorization"
          tokenPrefix: "Bearer "

          # Permission validation
          requiredPermissions:
            - "read:feeds"
            - "write:feeds"
          permissionsClaimName: "permissions"
          permissionLogic: "AND"  # or "OR"

          forwardClaims:
            sub: "X-User-Id"
            permissions: "X-User-Permissions"

          onError:
            statusCode: 403
            message: "Forbidden: Insufficient permissions"

    # JWT validation with custom validation
    jwt-custom:
      plugin:
        jwt:
          secret: "${JWT_SECRET}"
          algorithm: "HS256"
          tokenLocation: "header"
          tokenName: "Authorization"
          tokenPrefix: "Bearer "

          # Custom validation rules (Lua script)
          customValidation: |
            function validate(claims)
              -- Check if user is active
              if claims["status"] ~= "active" then
                return false, "Account is not active"
              end

              -- Check subscription level
              if claims["subscription"] == "free" then
                -- Apply rate limiting for free tier
                claims["rate_limit"] = "10"
              end

              return true
            end

          forwardClaims:
            sub: "X-User-Id"
            subscription: "X-User-Subscription"
            rate_limit: "X-Rate-Limit"

    # JWT validation with multi-tenancy
    jwt-multitenant:
      plugin:
        jwt:
          secret: "${JWT_SECRET}"
          algorithm: "HS256"
          tokenLocation: "header"
          tokenName: "Authorization"
          tokenPrefix: "Bearer "

          # Tenant validation
          requiredClaims:
            - "tenant_id"

          # Extract tenant and forward
          forwardClaims:
            sub: "X-User-Id"
            tenant_id: "X-Tenant-Id"
            tenant_name: "X-Tenant-Name"

          # Route based on tenant
          tenantRouting:
            enabled: true
            claimName: "tenant_id"
            routeHeader: "X-Tenant-Route"