name: Integration Tests

on:
  push:
    branches: [ main, develop, feature/* ]
    paths:
      - 'services/**'
      - 'tests/integration/**'
      - 'docker-compose.yml'
      - '.github/workflows/integration-tests.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'services/**'
      - 'tests/integration/**'
      - 'docker-compose.yml'

env:
  REGISTRY: ghcr.io
  IMAGE_TAG: ${{ github.sha }}
  DATABASE_URL: postgresql://news_user:+t1koDEJO+ruZ3QnYlkVeU2u6Z+zCJtL6wFW+wfN5Yk=@postgres:5432/news_mcp
  REDIS_URL: redis://:redis_secret_2024@redis:6379/0

jobs:
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: news_user
          POSTGRES_PASSWORD: '+t1koDEJO+ruZ3QnYlkVeU2u6Z+zCJtL6wFW+wfN5Yk='
          POSTGRES_DB: news_mcp
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli -a redis_secret_2024 ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

      rabbitmq:
        image: rabbitmq:3-management-alpine
        env:
          RABBITMQ_DEFAULT_USER: guest
          RABBITMQ_DEFAULT_PASS: guest
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5672:5672
          - 15672:15672

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Test Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r tests/integration/requirements.txt

      - name: Wait for Services
        run: |
          echo "Waiting for PostgreSQL..."
          until pg_isready -h postgres -p 5432 -U news_user; do
            sleep 1
          done
          echo "PostgreSQL is ready"

          echo "Waiting for Redis..."
          until redis-cli -h redis -p 6379 -a redis_secret_2024 ping; do
            sleep 1
          done
          echo "Redis is ready"

          echo "Waiting for RabbitMQ..."
          until (exec 3<>/dev/tcp/rabbitmq/5672 && echo "RabbitMQ is up"); do
            sleep 1
          done
          echo "RabbitMQ is ready"

      - name: Initialize Database
        run: |
          # Run migrations or create tables
          echo "Database initialization (if needed)"

      - name: Run Article Pipeline Tests
        run: |
          pytest tests/integration/test_article_pipeline.py -v \
            --tb=short \
            --junitxml=reports/article-pipeline.xml \
            --html=reports/article-pipeline.html \
            --self-contained-html

      - name: Run Cache Performance Tests
        run: |
          pytest tests/integration/test_cache_performance.py -v \
            --tb=short \
            --junitxml=reports/cache-performance.xml \
            --html=reports/cache-performance.html \
            --self-contained-html

      - name: Run Scheduler Tests
        run: |
          pytest tests/integration/test_scheduled_jobs.py -v \
            --tb=short \
            --junitxml=reports/scheduler-jobs.xml \
            --html=reports/scheduler-jobs.html \
            --self-contained-html

      - name: Run WebSocket Tests (Skip if unavailable)
        continue-on-error: true
        run: |
          pytest tests/integration/test_analytics_websocket.py -v \
            --tb=short \
            --junitxml=reports/analytics-websocket.xml \
            --html=reports/analytics-websocket.html \
            --self-contained-html || echo "WebSocket tests unavailable in CI"

      - name: Run All Integration Tests (Summary)
        if: always()
        run: |
          pytest tests/integration/ \
            --co -q | grep "test_" | wc -l | xargs echo "Total tests:"

      - name: Generate Coverage Report
        if: always()
        run: |
          pytest tests/integration/ \
            --cov=services \
            --cov-report=xml \
            --cov-report=html:reports/coverage || true

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: test-results
          path: |
            reports/
            logs/
          retention-days: 30

      - name: Upload Coverage
        if: always()
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          flags: integration
          name: integration-coverage

      - name: Comment PR with Test Results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            let summary = '## Integration Test Results\n\n';

            const files = [
              'reports/article-pipeline.xml',
              'reports/cache-performance.xml',
              'reports/scheduler-jobs.xml'
            ];

            for (const file of files) {
              if (fs.existsSync(file)) {
                const content = fs.readFileSync(file, 'utf8');
                const match = content.match(/tests="(\d+)" failures="(\d+)"/);
                if (match) {
                  const [, tests, failures] = match;
                  const name = file.split('/')[1].replace('.xml', '').replace('-', ' ');
                  const status = failures === '0' ? '✅' : '❌';
                  summary += `${status} ${name}: ${tests - failures}/${tests} passed\n`;
                }
              }
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            });

      - name: Fail if Tests Failed
        if: failure()
        run: |
          echo "Integration tests failed. Review the reports above."
          exit 1

  test-summary:
    name: Test Summary
    needs: integration-tests
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v3
        with:
          name: test-results

      - name: Print Summary
        run: |
          echo "## Integration Test Summary"
          echo ""
          echo "### Coverage Targets"
          echo "- Flow 1 (Article Pipeline): 80%+"
          echo "- Flow 2 (Analytics WebSocket): 70%+"
          echo "- Flow 3 (Cache Performance): 80%+"
          echo "- Flow 4 (Scheduled Jobs): 60%+"
          echo ""
          echo "Check artifacts for detailed reports."

  docker-compose-test:
    name: Docker Compose Integration
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Start Docker Compose
        run: |
          docker compose up -d
          echo "Waiting for services to be healthy..."
          for i in {1..30}; do
            if docker compose ps | grep -q "healthy"; then
              echo "Services are healthy"
              break
            fi
            sleep 2
          done

      - name: Check Service Health
        run: |
          echo "Checking auth-service..."
          curl -f http://localhost:8100/api/v1/health || echo "auth-service not ready"

          echo "Checking feed-service..."
          curl -f http://localhost:8101/api/v1/health || echo "feed-service not ready"

          echo "Checking analytics-service..."
          curl -f http://localhost:8107/api/v1/health || echo "analytics-service not ready"

      - name: Cleanup
        if: always()
        run: docker compose down -v

      - name: Report Status
        run: echo "Docker Compose test completed"
