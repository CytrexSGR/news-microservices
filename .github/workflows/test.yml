name: Test Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.11"
  POSTGRES_USER: test_user
  POSTGRES_PASSWORD: test_password
  POSTGRES_DB: test_db

jobs:
  test-shared-library:
    name: Test Shared Library
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt', '**/setup.py') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio pytest-cov black isort mypy ruff
          cd shared/news-mcp-common
          pip install -e ".[dev]"

      - name: Format check with black
        run: |
          cd shared/news-mcp-common
          black --check news_mcp_common/

      - name: Import sort check with isort
        run: |
          cd shared/news-mcp-common
          isort --check-only news_mcp_common/

      - name: Lint with ruff
        run: |
          cd shared/news-mcp-common
          ruff check news_mcp_common/

      - name: Type check with mypy
        run: |
          cd shared/news-mcp-common
          mypy news_mcp_common/ --ignore-missing-imports

      - name: Run tests with coverage
        env:
          POSTGRES_HOST: localhost
          REDIS_HOST: localhost
        run: |
          cd shared/news-mcp-common
          pytest tests/ -v --cov=news_mcp_common --cov-report=xml --cov-report=term-missing

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          file: ./shared/news-mcp-common/coverage.xml
          flags: shared-library
          name: shared-library-coverage

  test-services:
    name: Test Service - ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - auth-service
          - feed-service
          - content-analysis-v2
          - research-service
          - osint-service
          - notification-service
          - search-service
          - analytics-service
          - fmp-service
          - knowledge-graph-service
          - entity-canonicalization-service
          - llm-orchestrator-service

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      rabbitmq:
        image: rabbitmq:3.12-alpine
        ports:
          - 5672:5672
        env:
          RABBITMQ_DEFAULT_USER: admin
          RABBITMQ_DEFAULT_PASS: admin
        options: >-
          --health-cmd "rabbitmq-diagnostics check_running"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.service }}-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.service }}-
            ${{ runner.os }}-pip-

      - name: Install shared library
        run: |
          python -m pip install --upgrade pip
          pip install -e ./shared/news-mcp-common[dev]

      - name: Check if service exists
        id: check_service
        run: |
          if [ -d "services/${{ matrix.service }}" ] && [ -f "services/${{ matrix.service }}/requirements.txt" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Install service dependencies
        if: steps.check_service.outputs.exists == 'true'
        run: |
          cd services/${{ matrix.service }}
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov

      - name: Run service tests
        if: steps.check_service.outputs.exists == 'true'
        env:
          POSTGRES_HOST: localhost
          REDIS_HOST: localhost
          RABBITMQ_HOST: localhost
        run: |
          cd services/${{ matrix.service }}
          pytest tests/ -v --cov=app --cov-report=xml --cov-report=term-missing || echo "No tests found yet"

      - name: Upload coverage reports
        if: steps.check_service.outputs.exists == 'true'
        uses: codecov/codecov-action@v3
        with:
          file: ./services/${{ matrix.service }}/coverage.xml
          flags: ${{ matrix.service }}
          name: ${{ matrix.service }}-coverage

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [test-shared-library, test-services]

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      rabbitmq:
        image: rabbitmq:3.12-alpine
        ports:
          - 5672:5672
        env:
          RABBITMQ_DEFAULT_USER: admin
          RABBITMQ_DEFAULT_PASS: admin
        options: >-
          --health-cmd "rabbitmq-diagnostics check_running"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ./shared/news-mcp-common[dev]
          pip install pytest pytest-asyncio httpx

      - name: Check for integration tests
        id: check_tests
        run: |
          if [ -d "tests/integration" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Run integration tests
        if: steps.check_tests.outputs.exists == 'true'
        env:
          POSTGRES_HOST: localhost
          REDIS_HOST: localhost
          RABBITMQ_HOST: localhost
        run: |
          pytest tests/integration/ -v || echo "No integration tests found yet"

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit safety

      - name: Run Bandit security scan
        run: |
          bandit -r shared/news-mcp-common/news_mcp_common/ -f json -o bandit-report.json || true

      - name: Check dependencies with Safety
        run: |
          cd shared/news-mcp-common
          safety check --json || true

      - name: Upload security reports
        uses: actions/upload-artifact@v3
        with:
          name: security-reports
          path: |
            bandit-report.json

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [test-shared-library, test-services, integration-tests, security-scan]
    if: always()

    steps:
      - name: Check test results
        run: |
          echo "Test pipeline completed"
          echo "Shared Library: ${{ needs.test-shared-library.result }}"
          echo "Services: ${{ needs.test-services.result }}"
          echo "Integration: ${{ needs.integration-tests.result }}"
          echo "Security: ${{ needs.security-scan.result }}"

          if [ "${{ needs.test-shared-library.result }}" != "success" ] || \
             [ "${{ needs.test-services.result }}" != "success" ] || \
             [ "${{ needs.integration-tests.result }}" != "success" ]; then
            echo "Some tests failed"
            exit 1
          fi