name: 01 Lint (Docker, Shell, Compose)

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  dockerfile-lint:
    name: Hadolint (Dockerfile Linter)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Hadolint on all Dockerfiles
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: "services/*/Dockerfile"
          config: .hadolint.yaml
          failure-threshold: warning

  compose-validate:
    name: Docker Compose Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate compose/base.yml
        run: docker-compose -f compose/base.yml config --quiet

      - name: Validate compose/services.yml
        run: docker-compose -f compose/base.yml -f compose/services.yml config --quiet

      - name: Validate compose/monitoring.yml
        run: docker-compose -f compose/base.yml -f compose/monitoring.yml config --quiet

  shellcheck:
    name: ShellCheck (Bash Scripts)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: './scripts'
          severity: warning

  dockerfile-patterns:
    name: Dockerfile Anti-Pattern Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for COPY . .
        run: |
          FOUND=$(grep -r "^COPY \. \." services/*/Dockerfile || true)
          if [ -n "$FOUND" ]; then
            echo "❌ Found 'COPY . .' pattern:"
            echo "$FOUND"
            echo "Use selective COPY instead"
            exit 1
          fi
          echo "✅ No 'COPY . .' found"

      - name: Check Python version consistency
        run: |
          WRONG=$(grep -r "python:3\.12" services/*/Dockerfile || true)
          if [ -n "$WRONG" ]; then
            echo "❌ Found Python 3.12 (should be 3.11):"
            echo "$WRONG"
            exit 1
          fi
          echo "✅ Python version consistent (3.11)"

  image-size-check:
    name: Docker Image Size Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create Docker network
        run: docker network create news-network || true

      - name: Build Images
        run: |
          docker-compose -f compose/base.yml -f compose/services.yml build \
            auth-service feed-service content-analysis-service

      - name: Check Image Sizes
        run: |
          echo "=== Image Size Check ==="

          # Get sizes (remove 'MB' suffix for comparison)
          AUTH_SIZE=$(docker images compose-auth-service:latest --format "{{.Size}}" | sed 's/MB//')
          FEED_SIZE=$(docker images compose-feed-service:latest --format "{{.Size}}" | sed 's/MB//')
          CONTENT_SIZE=$(docker images compose-content-analysis-service:latest --format "{{.Size}}" | sed 's/MB//')

          echo "auth-service: ${AUTH_SIZE}MB (limit: 400MB)"
          echo "feed-service: ${FEED_SIZE}MB (limit: 400MB)"
          echo "content-analysis-service: ${CONTENT_SIZE}MB (limit: 600MB)"

          FAIL=0
          if (( $(echo "$AUTH_SIZE > 400" | bc -l) )); then
            echo "❌ auth-service exceeds 400MB limit"
            FAIL=1
          fi

          if (( $(echo "$FEED_SIZE > 400" | bc -l) )); then
            echo "❌ feed-service exceeds 400MB limit"
            FAIL=1
          fi

          if (( $(echo "$CONTENT_SIZE > 600" | bc -l) )); then
            echo "❌ content-analysis-service exceeds 600MB limit"
            FAIL=1
          fi

          if [ $FAIL -eq 1 ]; then
            exit 1
          fi

          echo "✅ All images within size limits"

  lint-summary:
    name: Lint Summary
    runs-on: ubuntu-latest
    needs: [dockerfile-lint, compose-validate, shellcheck, dockerfile-patterns, image-size-check]
    if: always()
    steps:
      - name: Check Results
        run: |
          if [ "${{ needs.dockerfile-lint.result }}" != "success" ] || \
             [ "${{ needs.compose-validate.result }}" != "success" ] || \
             [ "${{ needs.shellcheck.result }}" != "success" ] || \
             [ "${{ needs.dockerfile-patterns.result }}" != "success" ] || \
             [ "${{ needs.image-size-check.result }}" != "success" ]; then
            echo "❌ Some lint checks failed"
            exit 1
          fi
          echo "✅ All lint checks passed"
