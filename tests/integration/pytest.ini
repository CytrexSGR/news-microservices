[pytest]
# Pytest configuration for integration tests

# Asyncio mode: auto, strict, or legacy
asyncio_mode = auto

# Test discovery
testpaths = tests/integration
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers for test categorization
markers =
    integration: mark test as integration test
    asyncio: mark test as async
    slow: mark test as slow (>5 seconds)
    websocket: mark test as WebSocket test
    database: mark test as database test
    cache: mark test as cache/Redis test
    scheduler: mark test as scheduler test

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Timeout (in seconds)
timeout = 30
timeout_method = thread

# Logging
log_cli = false
log_cli_level = WARNING
log_file = logs/pytest.log
log_file_level = DEBUG

# Coverage
[coverage:run]
source = services
omit =
    */tests/*
    */venv/*
    */__pycache__/*
