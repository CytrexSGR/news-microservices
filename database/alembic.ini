# Alembic Configuration for News MCP Microservices
# Central migration management for all services

[alembic]
# Path to migration scripts
script_location = alembic

# Template used to generate migration files
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Timezone for timestamp
timezone = UTC

# Max length of characters to apply to the "slug" field
truncate_slug_length = 40

# Set to 'true' to run the environment during the 'revision' command
# revision_environment = false

# Set to 'true' to allow .pyc and .pyo files without a source .py file
# sourceless = false

# Version location specification
# version_locations = %(here)s/bar:%(here)s/bat:alembic/versions

# Version path separator
# version_path_separator = os  # Use os.pathsep. Default configuration used for new projects.
# version_path_separator = :
# version_path_separator = ;
# version_path_separator = space

# Output encoding
output_encoding = utf-8

# Database URL - loaded from environment
# Override with ALEMBIC_DATABASE_URL environment variable
sqlalchemy.url = postgresql://news_user:news_password@localhost:5433/news_mcp

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = INFO
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

# Post-write hook configurations
[post_write_hooks]
# Automatically format migration files with black
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 79 REVISION_SCRIPT_FILENAME

# Migration-specific configurations
[alembic:exclude]
# Tables to exclude from auto-generation (managed outside Alembic)
tables =

# Service-specific database configurations
# These can be overridden via environment variables
[service:auth]
database_url = postgresql://news_user:news_password@localhost:5433/news_mcp
schema = auth

[service:scheduler]
database_url = postgresql://news_user:news_password@localhost:5433/news_mcp
schema = scheduler

[service:content_analysis]
database_url = postgresql://news_user:news_password@localhost:5433/news_mcp
schema = content_analysis

[service:research]
database_url = postgresql://news_user:news_password@localhost:5433/news_mcp
schema = research

[service:osint]
database_url = postgresql://news_user:news_password@localhost:5433/news_mcp
schema = osint

[service:notification]
database_url = postgresql://news_user:news_password@localhost:5433/news_mcp
