  # ==========================================================================
  # Nginx Reverse Proxy (for external access via single port)
  # ==========================================================================

  nginx-proxy:
    image: nginx:alpine
    container_name: news-nginx-proxy
    restart: unless-stopped
    pids_limit: 256
    mem_limit: 128m
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - news_network
    depends_on:
      - auth-service
      - feed-service
      - analytics-service
      - search-service
      - frontend

  # ==========================================================================
  # Frontend
  # ==========================================================================

  frontend:
    logging: *default-logging
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: news-frontend
    restart: unless-stopped
    pids_limit: 512
    mem_limit: 512m
    environment:
      # Browser-accessible API URLs - use localhost with direct ports for dev mode
      # Port 3000 (Vite dev) calls services directly to avoid CORS issues
      VITE_AUTH_API_URL: "http://localhost:8100/api/v1"
      VITE_FEED_API_URL: "http://localhost:8101/api/v1"
      VITE_ANALYSIS_V2_API_URL: "http://localhost:8117"
      VITE_ANALYTICS_API_URL: "http://localhost:8107/api/v1"
      VITE_SEARCH_API_URL: "http://localhost:8106/api/v1"
      # Note: No /api/v1 suffix - API client adds paths like /health/ready and /api/v1/graph/stats
      VITE_KG_API_URL: "http://localhost:8111"
      VITE_FMP_API_URL: "http://localhost:8113/api/v1"
      VITE_NLP_API_URL: "http://localhost:8115"
      VITE_PREDICTION_API_URL: "http://localhost:8116/api/v1"
      VITE_EXECUTION_API_URL: "http://localhost:8120/api/v1"
      VITE_INTELLIGENCE_API_URL: "http://localhost:8118/api/v1/intelligence"
      VITE_MCP_API_URL: "http://localhost:9008"
    ports:
      - "3000:3000"
    volumes:
      # ================================================================
      # Source code - hot reload
      # ================================================================
      - ./frontend/src:/app/src
      - ./frontend/packages:/app/packages
      - ./frontend/public:/app/public

      # ================================================================
      # Entry point
      # ================================================================
      - ./frontend/index.html:/app/index.html

      # ================================================================
      # Configuration files (mounted for hot-reload config changes)
      # ================================================================
      - ./frontend/vite.config.ts:/app/vite.config.ts
      - ./frontend/tsconfig.json:/app/tsconfig.json
      - ./frontend/tsconfig.app.json:/app/tsconfig.app.json
      - ./frontend/tsconfig.node.json:/app/tsconfig.node.json
      - ./frontend/postcss.config.js:/app/postcss.config.js
      - ./frontend/tailwind.config.js:/app/tailwind.config.js
      - ./frontend/components.json:/app/components.json

      # ================================================================
      # CRITICAL: Prevent host overwriting container's node_modules
      # ================================================================
      # Anonymous volumes protect these directories from being
      # overwritten by host mounts (which would break Tailwind/Vite)
      - /app/node_modules
      - /app/.vite
    networks:
      - news_network
    depends_on:
      - auth-service
      - feed-service

  intelligence-frontend:
    logging: *default-logging
    build:
      context: ./intelligence-frontend
      dockerfile: Dockerfile.dev
    container_name: intelligence-frontend
    restart: unless-stopped
    pids_limit: 512
    mem_limit: 512m
    environment:
      VITE_API_URL: "http://localhost:8118"
    ports:
      - "3001:3001"
    volumes:
      # Source code - hot reload
      - ./intelligence-frontend/src:/app/src
      - ./intelligence-frontend/public:/app/public

      # Entry point
      - ./intelligence-frontend/index.html:/app/index.html

      # Configuration files
      - ./intelligence-frontend/vite.config.ts:/app/vite.config.ts
      - ./intelligence-frontend/tsconfig.json:/app/tsconfig.json
      - ./intelligence-frontend/tsconfig.node.json:/app/tsconfig.node.json
      - ./intelligence-frontend/tsconfig.app.json:/app/tsconfig.app.json
      - ./intelligence-frontend/postcss.config.js:/app/postcss.config.js
      - ./intelligence-frontend/tailwind.config.js:/app/tailwind.config.js

      # Protect node_modules
      - /app/node_modules
      - /app/.vite
    networks:
      - news_network
    depends_on:
      - intelligence-service

