        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      geolocation-service:
        condition: service_started
    healthcheck:
      test: ["CMD", "python3", "-c", "import os; exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ==========================================================================
  # Clustering Service (News Article Clustering)
  # Port: 8122 | Version: 1.0.0 | Epic 1.1 - Single-Pass Clustering
  # ==========================================================================

  clustering-service:
    logging: *default-logging
    build:
      context: .
      dockerfile: ./services/clustering-service/Dockerfile
    container_name: news-clustering-service
    restart: unless-stopped
    pids_limit: 512
    mem_limit: 384m
    environment:
      DATABASE_URL: postgresql+asyncpg://news_user:${POSTGRES_PASSWORD}@postgres:5432/news_mcp
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      RABBITMQ_VHOST: /
      SERVICE_NAME: clustering-service
      LOG_LEVEL: INFO
      SIMILARITY_THRESHOLD: 0.75
      CLUSTER_MAX_AGE_HOURS: 72
      BURST_ARTICLE_THRESHOLD: 5
      BURST_WINDOW_MINUTES: 15  # Increased from 5min - articles arrive too slowly for 5min windows
      JWT_SECRET_KEY: ef85d69e49bc971350142a18469c646d41addd16ac73d9b28392419b46000315
      # OpenAI Embeddings for Semantic Topic Search
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      # Feature Flag: Use article_clusters for profile matching (persistent, no duplicates)
      USE_ARTICLE_CLUSTERS: "true"
    ports:
      - "8122:8122"
    volumes:
      - ./services/clustering-service/app:/app/app
      - ./services/clustering-service/tests:/app/tests
      - ./services/clustering-service/alembic:/app/alembic
      - ./libs/news-intelligence-common:/tmp/news-intelligence-common
    networks:
      - news_network
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8122/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ==========================================================================
  # Clustering Celery Worker (Batch UMAP+HDBSCAN)
  # Runs periodic batch clustering for topic discovery (Epic 2)
  # ==========================================================================

  clustering-celery-worker:
    logging: *default-logging
    build:
      context: .
      dockerfile: ./services/clustering-service/Dockerfile
    container_name: news-clustering-celery-worker
    restart: unless-stopped
    pids_limit: 1024
    command: celery -A app.workers.batch_clustering_worker worker --loglevel=info --concurrency=1 -Q batch-clustering
    environment:
      DATABASE_URL: postgresql+asyncpg://news_user:${POSTGRES_PASSWORD}@postgres:5432/news_mcp
      SYNC_DATABASE_URL: postgresql://news_user:${POSTGRES_PASSWORD}@postgres:5432/news_mcp
      CELERY_BROKER_URL: redis://:redis_secret_2024@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:redis_secret_2024@redis:6379/0
      SERVICE_NAME: clustering-celery-worker
      LOG_LEVEL: INFO
      PYTHONPATH: /app
      # Batch clustering parameters
      BATCH_CLUSTERING_INTERVAL_HOURS: 2
      BATCH_MIN_CLUSTER_SIZE: 15
      BATCH_UMAP_COMPONENTS: 10
      BATCH_MAX_ARTICLES: 30000  # Limit for memory management
    mem_limit: 2g
    memswap_limit: 3g
    volumes:
      - ./services/clustering-service/app:/app/app
      - ./libs/news-intelligence-common:/tmp/news-intelligence-common
    networks:
      - news_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      # Note: Celery workers busy with long tasks (90s+) can't respond to pings
      # Check if celery process exists via /proc
      test: ["CMD-SHELL", "python -c \"import os; exit(0 if any('celery' in open(f'/proc/{p}/cmdline').read() for p in os.listdir('/proc') if p.isdigit()) else 1)\""]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 120s

