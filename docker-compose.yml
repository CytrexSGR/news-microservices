  # ==========================================================================
  # SITREP Service (Situation Report Generation)
  # Port: 8123 | Intelligence Briefing Generation from News Clusters
  # Epic 1.5: Consumes cluster events, applies time-decay, generates AI reports
  # ==========================================================================

  sitrep-service:
    logging: *default-logging
    build:
      context: .
      dockerfile: ./services/sitrep-service/Dockerfile
    container_name: news-sitrep-service
    restart: unless-stopped
    pids_limit: 512
    mem_limit: 384m
    environment:
      DATABASE_URL: postgresql+asyncpg://news_user:${POSTGRES_PASSWORD}@postgres:5432/news_mcp
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      RABBITMQ_VHOST: /
      RABBITMQ_EXCHANGE: news.events
      SERVICE_NAME: sitrep-service
      LOG_LEVEL: INFO
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: gpt-4o-mini
      SITREP_TOP_STORIES_COUNT: 10
      SITREP_MIN_CLUSTER_SIZE: 3
      SITREP_GENERATION_HOUR: 6
      JWT_SECRET_KEY: ef85d69e49bc971350142a18469c646d41addd16ac73d9b28392419b46000315
    ports:
      - "8123:8123"
    volumes:
      - ./services/sitrep-service/app:/app/app
      - ./services/sitrep-service/tests:/app/tests
      - ./libs/news-intelligence-common:/tmp/news-intelligence-common
    networks:
      - news_network
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      clustering-service:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8123/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ==========================================================================
  # NEXUS Agent (Port 8120)
  # AI Co-Pilot for News Microservices Platform
  # LangGraph + OpenAI powered intelligent assistant
  # ==========================================================================

  nexus-agent:
    logging: *default-logging
    build:
      context: ./services/nexus-agent
      dockerfile: Dockerfile.dev
    container_name: news-nexus-agent
    restart: unless-stopped
    pids_limit: 512
    mem_limit: 384m
    env_file:
      - ./services/nexus-agent/.env
    environment:
      # OpenAI Configuration
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: gpt-4o-mini
      OPENAI_TEMPERATURE: 0.7
      OPENAI_MAX_TOKENS: 1000

      # Phase 2: Database and Perplexity
      DATABASE_URL: postgresql+asyncpg://news_user:${POSTGRES_PASSWORD}@postgres:5432/news_mcp
      PERPLEXITY_API_KEY: ${PERPLEXITY_API_KEY}
      PERPLEXITY_BASE_URL: https://api.perplexity.ai
      PERPLEXITY_TIMEOUT: 30
      PERPLEXITY_MODEL: sonar

      # Service Configuration
      SERVICE_NAME: nexus-agent
      SERVICE_VERSION: 1.0.0
      SERVICE_PORT: 8120
      DEBUG: false

      # Logging
      LOG_LEVEL: INFO
      LOG_FORMAT: json

      # CORS
      CORS_ORIGINS: http://localhost:3000,http://localhost:5173
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8120:8000"
    volumes:
      - ./services/nexus-agent/app:/app/app
      - ./services/nexus-agent/prompts:/app/prompts
    networks:
      - news_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

