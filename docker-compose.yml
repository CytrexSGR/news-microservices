# ============================================================================
# News Microservices - Central Docker Compose
# ============================================================================
# Note: 'version' attribute removed (obsolete in Compose V2)
# Single source of truth for all services and infrastructure
# Last Updated: 2025-11-24 (Log Rotation Added - Disk Space Critical Fix)
# ============================================================================

# Global logging configuration to prevent disk overflow
# Prevents: 314GB log files from knowledge-graph-service (2025-11-24)
x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"      # Maximum size per log file
    max-file: "3"        # Keep 3 rotated files = max 30MB per container
    compress: "true"     # Compress rotated logs

networks:
  news_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  neo4j_data:
  n8n_data:
  prometheus_data:
  grafana_data:

services:
  # ==========================================================================
  # Infrastructure Services
  # ==========================================================================

  postgres:
    logging: *default-logging
    image: pgvector/pgvector:pg15  # Changed from postgres:15-alpine for Phase 4 memory
    container_name: postgres
    restart: unless-stopped
    pids_limit: 512
    mem_limit: 2g
    command: postgres -c max_connections=100 -c shared_buffers=128MB -c effective_cache_size=512MB -c work_mem=2MB
    environment:
      POSTGRES_USER: news_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: news_mcp
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - news_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U news_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    logging: *default-logging
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    pids_limit: 512
    mem_limit: 384m
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --auto-aof-rewrite-percentage 100
      --auto-aof-rewrite-min-size 64mb
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --requirepass redis_secret_2024
      --save 900 1
      --save 300 10
      --save 60 10000
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - news_network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis_secret_2024", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    logging: *default-logging
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq
    restart: unless-stopped
    pids_limit: 512
    mem_limit: 512m
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./certs/rabbitmq:/etc/rabbitmq/certs:ro           # TLS certificates (CVE-2025-002)
      - ./rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro    # TLS configuration
    ports:
      - "5671:5671"   # AMQPS (TLS-encrypted)
      - "5672:5672"   # AMQP (legacy, will be disabled by rabbitmq.conf)
      - "15672:15672" # Management UI
    networks:
      - news_network
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 30s
      timeout: 10s
      retries: 5

  neo4j:
    logging: *default-logging
    image: neo4j:5.25-community
    container_name: neo4j
    restart: unless-stopped
    pids_limit: 512
    mem_limit: 1536m
    environment:
      NEO4J_AUTH: neo4j/neo4j_password_2024
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_server_memory_heap_initial__size: 256m
      NEO4J_server_memory_heap_max__size: 512m
      NEO4J_server_memory_pagecache_size: 256m
    volumes:
      - neo4j_data:/data
    ports:
      - "7474:7474"  # HTTP Browser UI
      - "7687:7687"  # Bolt Protocol
    networks:
      - news_network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  n8n:
    logging: *default-logging
    image: docker.n8n.io/n8nio/n8n:2.1.1
    container_name: news-n8n
    restart: unless-stopped
    pids_limit: 512
    mem_limit: 512m
    environment:
      - N8N_BASIC_AUTH_ACTIVE=false
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - N8N_SECURE_COOKIE=false
      - WEBHOOK_URL=http://localhost:5678/
      - N8N_ENCRYPTION_KEY=mJX+qAI0/gegSrmTL2i/xe+hBJAp7Sjn
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=true
      # RabbitMQ Connection (isolated vhost /n8n)
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=n8n_user
      - RABBITMQ_PASSWORD=n8n_secret_2024
      - RABBITMQ_VHOST=n8n
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - news_network
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:5678/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  prometheus:
    logging: *default-logging
    image: prom/prometheus:latest
    container_name: news-prometheus
    restart: unless-stopped
    pids_limit: 512
    mem_limit: 256m
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
      - '--web.enable-lifecycle'
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - news_network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  grafana:
    logging: *default-logging
    image: grafana/grafana:latest
    container_name: news-grafana
    restart: unless-stopped
    pids_limit: 512
    mem_limit: 256m
    ports:
      - "3002:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SECURITY_ADMIN_USER=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3002
      - GF_INSTALL_PLUGINS=
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    networks:
      - news_network
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ==========================================================================
  # Application Services
  # ==========================================================================

  auth-service:
    logging: *default-logging
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile.dev
    container_name: news-auth-service
    restart: unless-stopped
    pids_limit: 512
    mem_limit: 384m
    env_file:
      - ./services/auth-service/.env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      CORS_ORIGINS: '["http://localhost:3000", "http://localhost:8080", "http://localhost:3000", "http://localhost:5173", "http://localhost:5173", "http://77.24.99.81:3000", "http://77.24.99.81:5173"]'
    ports:
      - "8100:8000"
    volumes:
      - ./services/auth-service/app:/app/app
      - ./services/auth-service/tests:/app/tests
      - ./services/common:/app/common  # Mount common rate limiting module
    networks:
      - news_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  feed-service:
    logging: *default-logging
    build:
      context: .
      dockerfile: ./services/feed-service/Dockerfile.dev
    container_name: news-feed-service
    restart: unless-stopped
    pids_limit: 512
    mem_limit: 512m
    command: >
      sh -c "pip install --quiet -e /app/shared/news-mcp-common && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --log-level debug"
    env_file:
      - ./services/feed-service/.env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      PYTHONPATH: /app:/app/shared:/app/shared/news-mcp-common
      NEMESIS_API_URL: "http://localhost:8765"
      SCRAPING_SERVICE_URL: "http://scraping-service:8000"
      SCHEDULER_ENABLED: "false"  # Disabled - using Celery Beat instead (single source)
      SCHEDULER_FETCH_TOLERANCE_SECONDS: "30"  # 30 seconds tolerance for fetch timing
    ports:
      - "8101:8000"
    volumes:
      - ./services/feed-service/app:/app/app
      - ./services/feed-service/tests:/app/tests
      - ./shared:/app/shared
      - ./services/common:/app/common  # Mount common rate limiting module
    networks:
      - news_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      auth-service:
        condition: service_started

  feed-service-celery-worker:
    logging: *default-logging
    build:
      context: .
      dockerfile: ./services/feed-service/Dockerfile.dev
    container_name: news-feed-service-celery-worker
    restart: unless-stopped
    pids_limit: 1024
    mem_limit: 512m
    command: >
      sh -c "pip install --quiet -e /app/shared/news-mcp-common && celery -A app.celery_app worker --loglevel=info --concurrency=2 -Q feed_outbox,feed_fetches,feed_bulk,maintenance,health,celery"
    env_file:
      - ./services/feed-service/.env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      PYTHONPATH: /app:/app/shared:/app/shared/news-mcp-common
      NEMESIS_API_URL: "http://localhost:8765"
      SCRAPING_SERVICE_URL: "http://scraping-service:8000"
    volumes:
      - ./services/feed-service/app:/app/app
      - ./shared:/app/shared
    networks:
      - news_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      feed-service:
        condition: service_started
    healthcheck:
      test: ["CMD", "celery", "-A", "app.celery_app", "inspect", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  feed-service-celery-beat:
    logging: *default-logging
    build:
      context: .
      dockerfile: ./services/feed-service/Dockerfile.dev
    container_name: news-feed-service-celery-beat
    restart: unless-stopped
    pids_limit: 512
    mem_limit: 256m
    command: >
      sh -c "pip install --quiet -e /app/shared/news-mcp-common && celery -A app.celery_app beat --loglevel=info"
    env_file:
      - ./services/feed-service/.env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      PYTHONPATH: /app:/app/shared:/app/shared/news-mcp-common
      NEMESIS_API_URL: "http://localhost:8765"
      SCRAPING_SERVICE_URL: "http://scraping-service:8000"
    volumes:
      - ./services/feed-service/app:/app/app
      - ./shared:/app/shared
    networks:
      - news_network
    healthcheck:
      disable: true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      feed-service:
        condition: service_started
      feed-service-celery-worker:
        condition: service_started

  feed-service-analysis-consumer:
    logging: *default-logging
    build:
      context: .
      dockerfile: ./services/feed-service/Dockerfile.dev
    container_name: news-feed-service-analysis-consumer
    restart: unless-stopped
    pids_limit: 512
    mem_limit: 384m
    command: python -m app.workers.analysis_consumer
    env_file:
      - ./services/feed-service/.env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      PYTHONPATH: /app:/app/shared
    volumes:
      - ./services/feed-service/app:/app/app
      - ./shared:/app/shared
    networks:
      - news_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      feed-service:
        condition: service_started
    healthcheck:
      test: ["CMD", "python3", "-c", "import os; exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

