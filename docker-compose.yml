      - /tmp:/host_tmp:ro  # Read-only access to host /tmp for docker-stats.json and alerts
      - /var/run/docker.sock:/var/run/docker.sock:ro  # Read-only Docker socket for live stats
      - ./services/common:/app/common  # Mount common rate limiting module
    networks:
      - news_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
