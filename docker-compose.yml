      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  search-celery-worker:
    logging: *default-logging
    build:
      context: ./services/search-service
      dockerfile: Dockerfile.dev
    container_name: news-search-celery-worker
    restart: unless-stopped
    pids_limit: 1024
    mem_limit: 384m
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=2
    env_file:
      - ./services/search-service/.env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
    volumes:
      - ./services/search-service/app:/app/app
    networks:
      - news_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      search-service:
        condition: service_started
    # Override health check from Dockerfile (Celery worker has no HTTP server)
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.workers.celery_app inspect ping -d celery@$${HOSTNAME} -t 10 || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3

  analytics-service:
    logging: *default-logging
    build:
      context: .
      dockerfile: ./services/analytics-service/Dockerfile.dev
    container_name: news-analytics-service
    restart: unless-stopped
    pids_limit: 512
    mem_limit: 384m
    env_file:
      - ./services/analytics-service/.env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      PYTHONPATH: /app  # Task 403: Allow shared imports
      CORS_ORIGINS: '["http://localhost:3000", "http://localhost:8080", "http://localhost:3000", "http://localhost:5173", "http://localhost:5173", "http://77.24.99.81:3000", "http://77.24.99.81:5173"]'
      OPENAI_API_KEY: ${OPENAI_API_KEY}  # RAG Ask Intelligence feature
