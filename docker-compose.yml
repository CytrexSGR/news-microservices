      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  geolocation-service-consumer:
    logging: *default-logging
    build:
      context: .
      dockerfile: ./services/geolocation-service/Dockerfile.dev
    container_name: news-geolocation-consumer
    restart: unless-stopped
    pids_limit: 512
    mem_limit: 384m
    command: python -m app.workers.geo_consumer
    env_file:
      - ./services/geolocation-service/.env
    environment:
      DATABASE_URL: "postgresql+asyncpg://news_user:${POSTGRES_PASSWORD}@postgres:5432/news_mcp"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: redis_secret_2024
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      ENTITY_CANONICALIZATION_URL: http://entity-canonicalization-service:8112
    volumes:
      - ./services/geolocation-service/app:/app/app
    networks:
      - news_network
    depends_on:
