      dockerfile: Dockerfile
    container_name: mcp-knowledge-graph-server
    restart: unless-stopped
    pids_limit: 512
    mem_limit: 256m
    env_file:
      - ./services/mcp-knowledge-graph-server/.env
    environment:
      # Server Config
      HOST: 0.0.0.0
      PORT: 9004
      LOG_LEVEL: INFO

      # Backend Service URLs (Docker internal network)
      KNOWLEDGE_GRAPH_URL: http://knowledge-graph-service:8111

      # HTTP Client
      HTTP_TIMEOUT: 30
      MAX_CONNECTIONS: 100
      MAX_KEEPALIVE_CONNECTIONS: 20

      # Circuit Breaker Settings
      CIRCUIT_BREAKER_FAILURE_THRESHOLD: 5
      CIRCUIT_BREAKER_RECOVERY_TIMEOUT: 60

      # Redis Cache Settings
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 7
      REDIS_PASSWORD: redis_secret_2024
      CACHE_TTL_SHORT: 60       # 1 min for volatile data
      CACHE_TTL_MEDIUM: 300     # 5 min for semi-stable data
      CACHE_TTL_LONG: 3600      # 1 hour for stable data
      CACHE_TTL_ENTITY: 300     # Entity connections
      CACHE_TTL_STATS: 60       # Statistics (frequent changes)
      CACHE_TTL_SEARCH: 300     # Search results
      CACHE_TTL_ANALYTICS: 600  # Analytics (10 min)
      CACHE_TTL_MARKET: 60      # Market data (volatile)
    ports:
      - "9004:9004"
    volumes:
      - ./services/mcp-knowledge-graph-server/app:/app/app
    networks:
      - news_network
    depends_on:
      redis:
        condition: service_started
      knowledge-graph-service:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9004/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
