  # ============================================================================
  # Content-Analysis-V3 API (Cost-Optimized Pipeline)
  # 96.7% cost reduction vs V2 ($0.0085 → $0.00028 per article)
  # ============================================================================
  content-analysis-v3-api:
    logging: *default-logging
    build:
      context: .
      dockerfile: ./services/content-analysis-v3/Dockerfile.dev
    container_name: news-content-analysis-v3-api
    restart: unless-stopped
    pids_limit: 512
    mem_limit: 384m
    env_file:
      - ./services/content-analysis-v3/.env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: news_mcp
      POSTGRES_USER: news_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      PYTHONPATH: /app:/app/shared
    ports:
      - "8117:8117"
    volumes:
      - ./services/content-analysis-v3/app:/app/app
      - ./services/content-analysis-v3/tests:/app/tests
      - ./services/content-analysis-v3/.env:/app/.env
      - ./shared:/app/shared  # Mount shared auth module
    networks:
      - news_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8117/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Content-Analysis-V3 Consumer (RabbitMQ Worker)
  content-analysis-v3-consumer:
    logging: *default-logging
    build:
      context: .
      dockerfile: ./services/content-analysis-v3/Dockerfile.dev
    container_name: news-content-analysis-v3-consumer
    restart: unless-stopped
    pids_limit: 512
    mem_limit: 384m
    command: python -m app.messaging.request_consumer
    env_file:
      - ./services/content-analysis-v3/.env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: news_mcp
      POSTGRES_USER: news_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      PYTHONPATH: /app
    volumes:
      - ./services/content-analysis-v3/app:/app/app
      - ./services/content-analysis-v3/.env:/app/.env
    networks:
      - news_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import os; exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  research-service:
    logging: *default-logging
    build:
      context: .
      dockerfile: ./services/research-service/Dockerfile.dev
    container_name: news-research-service
    restart: unless-stopped
    pids_limit: 512
    mem_limit: 384m
    command: >
      sh -c "pip install --quiet -e /app/shared/news-mcp-common && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    env_file:
      - ./services/research-service/.env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      PYTHONPATH: /app:/app/shared:/app/shared/news-mcp-common
    ports:
      - "8103:8000"
    volumes:
      - ./services/research-service/app:/app/app
      - ./services/research-service/tests:/app/tests
      - ./shared:/app/shared
      - ./services/common:/app/common  # Mount common rate limiting module
    networks:
      - news_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  research-celery-worker:
    logging: *default-logging
    build:
      context: .
      dockerfile: ./services/research-service/Dockerfile.dev
    container_name: news-research-celery-worker
    restart: unless-stopped
    pids_limit: 512
    mem_limit: 384m
    command: >
      sh -c "pip install --quiet -e /app/shared/news-mcp-common && celery -A app.workers.celery_app worker --loglevel=info --concurrency=2 --queues=research,research_scheduled,research_batch,maintenance,health"
    env_file:
      - ./services/research-service/.env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      PYTHONPATH: /app:/app/shared:/app/shared/news-mcp-common
    volumes:
      - ./services/research-service/app:/app/app
      - ./shared:/app/shared
    networks:
      - news_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      research-service:
        condition: service_started
    # Override health check from Dockerfile (Celery worker has no HTTP server)
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.workers.celery_app inspect ping -d celery@$${HOSTNAME} -t 10 || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3

