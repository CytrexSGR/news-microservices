    logging: *default-logging
    build:
      context: ./services/search-service
      dockerfile: Dockerfile.dev
    container_name: news-search-service
    restart: unless-stopped
    pids_limit: 512
    mem_limit: 384m
    env_file:
      - ./services/search-service/.env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      JWT_SECRET_KEY: ef85d69e49bc971350142a18469c646d41addd16ac73d9b28392419b46000315
      JWT_ALGORITHM: HS256
      # Semantic Search (Layer 1) - uses same API key as clustering-service
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    ports:
      - "8106:8000"  # Bind to all interfaces for frontend access
    volumes:
      - ./services/search-service/app:/app/app
      - ./services/search-service/tests:/app/tests
      - ./services/common:/app/common  # Mount common rate limiting module
    networks:
      - news_network
