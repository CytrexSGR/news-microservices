# ============================================================================
# RabbitMQ Configuration - TLS Enabled
# ============================================================================
#
# CVE-2025-002 Mitigation: Enforces TLS encryption for all connections
#
# This configuration:
# - Enables TLS on port 5671 (AMQPS)
# - Disables unencrypted AMQP on port 5672
# - Uses mutual TLS (verify_peer) for enhanced security
# - Keeps management UI on port 15672 (HTTPS should be configured separately)
#
# Generated certificates:
#   /etc/rabbitmq/certs/ca-cert.pem     - Certificate Authority
#   /etc/rabbitmq/certs/server-cert.pem - Server certificate
#   /etc/rabbitmq/certs/server-key.pem  - Server private key
#
# ============================================================================

# ----------------------------------------------------------------------------
# TLS/SSL Configuration
# ----------------------------------------------------------------------------

# TLS listener on port 5671 (AMQPS)
listeners.ssl.default = 5671

# Disable plain AMQP listener on port 5672 (security enhancement)
# Comment this line if you need to support legacy clients temporarily
# TEMPORARILY ENABLED: Workers not yet configured for TLS
listeners.tcp.default = 5672

# TLS options
ssl_options.cacertfile   = /etc/rabbitmq/certs/ca-cert.pem
ssl_options.certfile     = /etc/rabbitmq/certs/server-cert.pem
ssl_options.keyfile      = /etc/rabbitmq/certs/server-key.pem

# Verify peer certificates (mutual TLS)
# Options:
#   verify_peer             - Require client certificate (highest security)
#   verify_none             - Accept any client (lower security, easier setup)
ssl_options.verify       = verify_peer

# Fail if client doesn't provide valid certificate
# Set to false for one-way TLS (server auth only)
ssl_options.fail_if_no_peer_cert = false

# TLS versions (disable older, insecure versions)
ssl_options.versions.1 = tlsv1.3
ssl_options.versions.2 = tlsv1.2

# Cipher suites (restrict to secure ciphers)
# This list prioritizes forward secrecy and modern encryption
ssl_options.ciphers.1 = ECDHE-ECDSA-AES256-GCM-SHA384
ssl_options.ciphers.2 = ECDHE-RSA-AES256-GCM-SHA384
ssl_options.ciphers.3 = ECDHE-ECDSA-AES128-GCM-SHA256
ssl_options.ciphers.4 = ECDHE-RSA-AES128-GCM-SHA256

# Honor server cipher order
ssl_options.honor_cipher_order = true

# Session resumption (performance optimization)
ssl_options.reuse_sessions = true

# ----------------------------------------------------------------------------
# Management Plugin Configuration
# ----------------------------------------------------------------------------

# Management UI on port 15672 (HTTP)
# NOTE: For production, enable HTTPS for management UI
# management.ssl.port       = 15671
# management.ssl.cacertfile = /etc/rabbitmq/certs/ca-cert.pem
# management.ssl.certfile   = /etc/rabbitmq/certs/server-cert.pem
# management.ssl.keyfile    = /etc/rabbitmq/certs/server-key.pem

# ----------------------------------------------------------------------------
# Default User Configuration
# ----------------------------------------------------------------------------

# Default user (can be overridden by environment variables)
# default_user = guest
# default_pass = guest

# Restrict guest user to localhost only (security best practice)
loopback_users.guest = true

# ----------------------------------------------------------------------------
# Performance & Resource Limits
# ----------------------------------------------------------------------------

# Virtual host limits
vm_memory_high_watermark.relative = 0.6
vm_memory_high_watermark_paging_ratio = 0.75

# Disk space limits
disk_free_limit.relative = 1.0

# Connection limits
# Adjust based on expected load
num_acceptors.ssl = 10

# ----------------------------------------------------------------------------
# Logging
# ----------------------------------------------------------------------------

# Log levels: debug, info, warning, error, critical, none
log.console.level = info
log.file.level = warning

# Log file location
log.dir = /var/log/rabbitmq
log.file = rabbit.log

# Rotate logs
log.file.rotation.count = 5
log.file.rotation.size = 10485760

# ----------------------------------------------------------------------------
# Security Headers & Best Practices
# ----------------------------------------------------------------------------

# Heartbeat timeout (detect dead connections)
heartbeat = 60

# Frame max size (prevent large message attacks)
frame_max = 131072

# Channel max (prevent resource exhaustion)
channel_max = 2047

# ----------------------------------------------------------------------------
# Notes
# ----------------------------------------------------------------------------

# After updating this configuration:
# 1. Restart RabbitMQ: docker compose restart rabbitmq
# 2. Update client connection strings to use amqps://
# 3. Test connection: openssl s_client -connect localhost:5671
# 4. Monitor logs for TLS handshake errors
# 5. Update applications to use TLS (see config.py)

# For troubleshooting:
# - Check logs: docker compose logs rabbitmq
# - Verify certificates: openssl x509 -in ca-cert.pem -noout -text
# - Test connection: openssl s_client -connect localhost:5671 -CAfile ca-cert.pem
