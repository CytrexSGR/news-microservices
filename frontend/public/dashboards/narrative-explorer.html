<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Narrative Explorer | News Intelligence</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      color: #fff;
    }
    .header {
      padding: 20px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .header h1 { font-size: 1.5rem; }
    .search-box {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .search-input {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      padding: 10px 15px;
      color: #fff;
      font-size: 1rem;
      width: 300px;
    }
    .search-input::placeholder { color: rgba(255,255,255,0.5); }
    .search-btn {
      background: #4fc3f7;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      color: #1a1a2e;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .search-btn:hover { background: #81d4fa; }
    .container { max-width: 1400px; margin: 0 auto; padding: 25px; }
    .entity-header {
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      padding: 25px;
      margin-bottom: 25px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .entity-name { font-size: 2rem; font-weight: 700; }
    .entity-type {
      background: rgba(79, 195, 247, 0.2);
      color: #4fc3f7;
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 0.85rem;
      margin-left: 15px;
    }
    .metrics-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; margin-bottom: 25px; }
    .metric {
      background: rgba(255,255,255,0.05);
      border-radius: 10px;
      padding: 20px;
      text-align: center;
    }
    .metric-value { font-size: 1.8rem; font-weight: 700; color: #4fc3f7; }
    .metric-label { color: rgba(255,255,255,0.6); margin-top: 5px; font-size: 0.85rem; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; }
    .card {
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      padding: 25px;
    }
    .card h2 { font-size: 1.1rem; margin-bottom: 15px; opacity: 0.9; }
    .chart-container { height: 280px; position: relative; }
    .narrative-list { max-height: 400px; overflow-y: auto; }
    .narrative-item {
      background: rgba(255,255,255,0.03);
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 10px;
    }
    .narrative-item:hover { background: rgba(255,255,255,0.06); }
    .narrative-frame {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 4px;
      font-size: 0.8rem;
      margin-right: 10px;
    }
    .frame-conflict { background: rgba(244, 67, 54, 0.2); color: #f44336; }
    .frame-responsibility { background: rgba(255, 152, 0, 0.2); color: #ff9800; }
    .frame-economic { background: rgba(76, 175, 80, 0.2); color: #4caf50; }
    .frame-morality { background: rgba(156, 39, 176, 0.2); color: #9c27b0; }
    .frame-human { background: rgba(33, 150, 243, 0.2); color: #2196f3; }
    .frame-default { background: rgba(158, 158, 158, 0.2); color: #9e9e9e; }
    .tension-badge {
      float: right;
      padding: 3px 10px;
      border-radius: 4px;
      font-size: 0.8rem;
    }
    .tension-high { background: rgba(244, 67, 54, 0.2); color: #f44336; }
    .tension-medium { background: rgba(255, 193, 7, 0.2); color: #ffc107; }
    .tension-low { background: rgba(76, 175, 80, 0.2); color: #4caf50; }
    .related-entities { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 15px; }
    .entity-tag {
      background: rgba(79, 195, 247, 0.15);
      color: #4fc3f7;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .entity-tag:hover { background: rgba(79, 195, 247, 0.3); }
    .loading { opacity: 0.5; pointer-events: none; }
    .empty-state { text-align: center; padding: 60px; color: rgba(255,255,255,0.5); }
    @media (max-width: 768px) {
      .metrics-row { grid-template-columns: repeat(2, 1fr); }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🔍 Narrative Explorer</h1>
    <div class="search-box">
      <input type="text" id="searchInput" class="search-input" placeholder="Search entity (e.g., Trump, Russia)...">
      <button class="search-btn" onclick="searchEntity()">Explore</button>
    </div>
  </div>

  <div class="container">
    <div id="content" class="empty-state">
      <h2>Search for an entity to explore its narrative landscape</h2>
      <p style="margin-top: 10px;">Try searching for: Trump, Russia, Ukraine, Bitcoin, Fed...</p>
    </div>
  </div>

  <script>
    const API_BASE = window.location.hostname === 'localhost'
      ? 'http://localhost:8111/api/v1/graph'
      : '/api/v1/graph';

    let frameChart, tensionChart;

    const FRAME_COLORS = {
      conflict: '#f44336',
      responsibility: '#ff9800',
      economic_consequences: '#4caf50',
      morality: '#9c27b0',
      human_interest: '#2196f3',
      security: '#795548',
      informational: '#607d8b',
      default: '#9e9e9e'
    };

    function getFrameClass(frame) {
      const f = frame?.toLowerCase() || '';
      if (f.includes('conflict')) return 'frame-conflict';
      if (f.includes('responsibility')) return 'frame-responsibility';
      if (f.includes('economic')) return 'frame-economic';
      if (f.includes('moral')) return 'frame-morality';
      if (f.includes('human')) return 'frame-human';
      return 'frame-default';
    }

    function getTensionClass(t) {
      if (t >= 0.7) return 'tension-high';
      if (t >= 0.4) return 'tension-medium';
      return 'tension-low';
    }

    async function searchEntity() {
      const query = document.getElementById('searchInput').value.trim();
      if (!query) return;

      document.body.classList.add('loading');

      try {
        const [framingRes, narrativesRes] = await Promise.all([
          fetch(`${API_BASE}/narratives/entity-framing/${encodeURIComponent(query)}`),
          fetch(`${API_BASE}/narratives/frames/${encodeURIComponent(query)}?limit=20`)
        ]);

        if (!framingRes.ok) throw new Error('Entity not found');

        const framing = await framingRes.json();
        const narratives = await narrativesRes.json();

        renderEntityView(query, framing, narratives);
      } catch (error) {
        console.error('Search error:', error);
        document.getElementById('content').innerHTML = `
          <div class="empty-state">
            <h2>❌ Entity not found</h2>
            <p>No narrative data for "${query}". Try another entity.</p>
          </div>
        `;
      } finally {
        document.body.classList.remove('loading');
      }
    }

    function renderEntityView(entityName, framing, narratives) {
      const frames = framing.frames || [];
      const narrativeList = Array.isArray(narratives) ? narratives : [];

      const avgTension = framing.avg_tension || 0;
      const maxTension = framing.max_tension || 0;
      const narrativeCount = framing.narrative_count || narrativeList.length;
      const dominantFrame = frames.length > 0 ? frames[0].frame_type : 'N/A';
      const frameCount = frames.length;

      // Get related entities from narratives
      const relatedEntities = new Set();
      narrativeList.forEach(n => {
        (n.entities || []).forEach(e => {
          if (e.toLowerCase() !== entityName.toLowerCase()) {
            relatedEntities.add(e);
          }
        });
      });

      const html = `
        <div class="entity-header">
          <div>
            <span class="entity-name">${entityName}</span>
            <span class="entity-type">${framing.entity_type || 'ENTITY'}</span>
          </div>
          <div style="text-align: right; color: rgba(255,255,255,0.6); font-size: 0.85rem;">
            Last updated: ${new Date().toLocaleTimeString('de-DE')}
          </div>
        </div>

        <div class="metrics-row">
          <div class="metric">
            <div class="metric-value">${narrativeCount.toLocaleString()}</div>
            <div class="metric-label">Narratives</div>
          </div>
          <div class="metric">
            <div class="metric-value">${avgTension.toFixed(2)}</div>
            <div class="metric-label">Avg Tension</div>
          </div>
          <div class="metric">
            <div class="metric-value">${maxTension.toFixed(2)}</div>
            <div class="metric-label">Max Tension</div>
          </div>
          <div class="metric">
            <div class="metric-value">${frameCount}</div>
            <div class="metric-label">Frame Types</div>
          </div>
          <div class="metric">
            <div class="metric-value">${dominantFrame}</div>
            <div class="metric-label">Dominant Frame</div>
          </div>
        </div>

        <div class="grid">
          <div class="card">
            <h2>📊 Frame Distribution</h2>
            <div class="chart-container">
              <canvas id="frameChart"></canvas>
            </div>
          </div>

          <div class="card">
            <h2>📈 Tension by Frame</h2>
            <div class="chart-container">
              <canvas id="tensionChart"></canvas>
            </div>
          </div>

          <div class="card">
            <h2>📋 Recent Narratives</h2>
            <div class="narrative-list" id="narrativeList">
              ${narrativeList.slice(0, 10).map(n => `
                <div class="narrative-item">
                  <span class="narrative-frame ${getFrameClass(n.frame_type)}">${n.frame_type || 'unknown'}</span>
                  <span class="tension-badge ${getTensionClass(n.tension || 0)}">${(n.tension || 0).toFixed(2)}</span>
                  <div style="margin-top: 8px; font-size: 0.9rem; color: rgba(255,255,255,0.8);">
                    ${(n.entities || []).slice(0, 5).join(', ')}
                  </div>
                </div>
              `).join('') || '<div class="empty-state">No narratives found</div>'}
            </div>
          </div>

          <div class="card">
            <h2>🔗 Related Entities</h2>
            <div class="related-entities">
              ${[...relatedEntities].slice(0, 20).map(e => `
                <span class="entity-tag" onclick="document.getElementById('searchInput').value='${e}';searchEntity();">${e}</span>
              `).join('') || '<span style="color: rgba(255,255,255,0.5);">No related entities found</span>'}
            </div>
          </div>
        </div>
      `;

      document.getElementById('content').innerHTML = html;

      // Render charts
      setTimeout(() => {
        renderFrameChart(frames);
        renderTensionChart(frames);
      }, 100);
    }

    function renderFrameChart(frames) {
      const ctx = document.getElementById('frameChart')?.getContext('2d');
      if (!ctx) return;

      const data = frames.slice(0, 8);
      const labels = data.map(f => f.frame_type);
      const values = data.map(f => f.count);
      const colors = labels.map(l => FRAME_COLORS[l] || FRAME_COLORS.default);

      if (frameChart) frameChart.destroy();
      frameChart = new Chart(ctx, {
        type: 'doughnut',
        data: {
          labels,
          datasets: [{
            data: values,
            backgroundColor: colors,
            borderWidth: 0
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { position: 'right', labels: { color: '#fff', font: { size: 11 } } }
          }
        }
      });
    }

    function renderTensionChart(frames) {
      const ctx = document.getElementById('tensionChart')?.getContext('2d');
      if (!ctx) return;

      const data = frames.slice(0, 8);
      const labels = data.map(f => f.frame_type);
      const tensions = data.map(f => f.avg_tension || 0);
      const colors = tensions.map(t => t >= 0.7 ? '#f44336' : t >= 0.4 ? '#ffc107' : '#4caf50');

      if (tensionChart) tensionChart.destroy();
      tensionChart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels,
          datasets: [{
            label: 'Avg Tension',
            data: tensions,
            backgroundColor: colors,
            borderRadius: 4
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          indexAxis: 'y',
          scales: {
            x: { min: 0, max: 1, ticks: { color: '#fff' }, grid: { color: 'rgba(255,255,255,0.1)' } },
            y: { ticks: { color: '#fff', font: { size: 10 } }, grid: { display: false } }
          },
          plugins: { legend: { display: false } }
        }
      });
    }

    // Enter key search
    document.getElementById('searchInput').addEventListener('keypress', e => {
      if (e.key === 'Enter') searchEntity();
    });

    // Load default entity
    window.onload = () => {
      document.getElementById('searchInput').value = 'Trump';
      searchEntity();
    };
  </script>
</body>
</html>
