# News Microservices - Production Nginx Configuration
# Serves static frontend and proxies API requests to backend services
# Last Updated: 2025-11-30 (Phase 4 Production Deployment)

server {
    listen 80;
    server_name _;

    # ========================================================================
    # Performance & Compression
    # ========================================================================

    # Gzip compression for faster delivery
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss
               application/atom+xml image/svg+xml;

    # Client upload size limit (for article content, images, etc.)
    client_max_body_size 10M;

    # Timeout settings
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # ========================================================================
    # Static Frontend (React/Vite Build)
    # ========================================================================

    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;

        # Cache static assets (fingerprinted by Vite)
        location ~* \.(?:css|js|jpg|jpeg|gif|png|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Don't cache HTML (for deployment updates)
        location ~* \.html$ {
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }
    }

    # ========================================================================
    # Backend API Proxies
    # ========================================================================

    # Auth Service (Port 8100)
    location /api/auth {
        proxy_pass http://news-auth-service:8000/api/v1;
        proxy_redirect off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Feed Service (Port 8101)
    location /api/feed {
        proxy_pass http://news-feed-service:8000/api/v1;
        proxy_redirect off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Analytics Service (Port 8107)
    location /api/analytics {
        proxy_pass http://news-analytics-service:8000/api/v1;
        proxy_redirect off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Search Service (Port 8106)
    location /api/search {
        proxy_pass http://news-search-service:8000/api/v1;
        proxy_redirect off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Knowledge Graph Service (Port 8111)
    location /api/kg {
        proxy_pass http://news-knowledge-graph:8000/api/v1;
        proxy_redirect off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # NOTE: NLP Extraction Service (8115) removed - service archived 2025-12-27

    # Prediction Service (Port 8116) - Trading/Backtesting
    location /api/prediction {
        proxy_pass http://news-prediction-service:8000/api/v1;
        proxy_redirect off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # NOTE: Execution Service (Port 8120) removed - service archived (2025-12-28)

    # FMP Service (Port 8113) - Financial Market Data
    # Note: Uses /api/v1 prefix (different from others)
    location /api/v1 {
        proxy_pass http://news-fmp-service:8000/api/v1;
        proxy_redirect off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ========================================================================
    # WebSocket Support (FMP Real-Time Data)
    # ========================================================================

    location /ws {
        proxy_pass http://news-fmp-service:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket timeout (keep connection alive)
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ========================================================================
    # Health Check Endpoints
    # ========================================================================

    # Nginx health check
    location /nginx-health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # ========================================================================
    # Security Headers
    # ========================================================================

    # Prevent clickjacking
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Prevent MIME type sniffing
    add_header X-Content-Type-Options "nosniff" always;

    # Enable XSS protection
    add_header X-XSS-Protection "1; mode=block" always;

    # Referrer policy
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # ========================================================================
    # Error Pages
    # ========================================================================

    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;

    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
