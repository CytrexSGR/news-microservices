# Hadolint configuration for Dockerfile linting
# https://github.com/hadolint/hadolint

ignored:
  - DL3008  # Pin versions in apt-get (too strict for dev, handled in CI)

trustedRegistries:
  - docker.io
  - ghcr.io
  - mcr.microsoft.com

failure-threshold: warning

override:
  error:
    - DL3000  # Use absolute WORKDIR
    - DL3002  # Last USER should not be root
    - DL3006  # Always tag Docker images
    - DL3020  # Use COPY instead of ADD for files
    - DL3025  # Use JSON for CMD and ENTRYPOINT

  warning:
    - DL3003  # Use WORKDIR instead of cd
    - DL3009  # Delete apt-get lists after install
    - DL3015  # Avoid additional packages in apt-get

  info:
    - DL3018  # Pin versions in apk add
    - DL3028  # Pin versions in gem install

format: tty
no-color: false
no-fail: false
