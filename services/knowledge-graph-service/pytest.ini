[pytest]
# Pytest configuration for knowledge-graph-service

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Markers (custom test categories)
markers =
    integration: Integration tests requiring running services (deselect with '-m "not integration"')
    slow: Slow tests taking >10 seconds (deselect with '-m "not slow"')
    performance: Performance benchmark tests
    unit: Unit tests (fast, isolated)
    asyncio: Async tests (automatically applied by pytest-asyncio)

# Asyncio configuration
asyncio_mode = auto

# Output
addopts =
    -ra
    --strict-markers
    --strict-config
    --showlocals
    --tb=short

# Logging
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

log_file = tests/pytest.log
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)8s] [%(name)s] %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S

# Coverage (if pytest-cov is installed)
# Uncomment to enable coverage reporting
# addopts = --cov=app --cov-report=term-missing --cov-report=html

# Timeouts (if pytest-timeout is installed)
# timeout = 300
# timeout_method = thread

# Warnings
filterwarnings =
    error
    ignore::UserWarning
    ignore::DeprecationWarning
