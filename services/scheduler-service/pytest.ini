[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Coverage settings
addopts =
    --verbose
    --strict-markers
    --cov=app
    --cov-report=term-missing
    --cov-report=html:coverage_html
    --cov-report=xml
    --cov-branch
    --cov-fail-under=80
    --asyncio-mode=auto
    --timeout=300
    -ra

markers =
    unit: Unit tests (fast, no external dependencies)
    integration: Integration tests (require DB, Redis, RabbitMQ)
    slow: Slow tests (>1 second)
    scheduler: Tests for scheduler components
    jobs: Tests for job processing
    monitor: Tests for feed monitoring
    entity: Tests for entity processing

# Async settings
asyncio_mode = auto

# Timeout for tests
timeout = 300

# Ignore warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
