apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: news-mcp-dev

bases:
  - ../../base

namePrefix: dev-

commonLabels:
  environment: development

patchesStrategicMerge:
  - config-patch.yaml

configMapGenerator:
  - name: news-mcp-config
    behavior: merge
    literals:
      - ENVIRONMENT=development
      - DEBUG=true
      - LOG_LEVEL=DEBUG

replicas:
  - name: postgres
    count: 1
  - name: redis
    count: 1
  - name: rabbitmq
    count: 1
  - name: minio
    count: 1