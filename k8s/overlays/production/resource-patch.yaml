apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: news-mcp-prod
spec:
  template:
    spec:
      containers:
      - name: postgres
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: news-mcp-prod
spec:
  template:
    spec:
      containers:
      - name: redis
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: rabbitmq
  namespace: news-mcp-prod
spec:
  template:
    spec:
      containers:
      - name: rabbitmq
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: minio
  namespace: news-mcp-prod
spec:
  template:
    spec:
      containers:
      - name: minio
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"