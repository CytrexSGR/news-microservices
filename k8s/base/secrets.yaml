apiVersion: v1
kind: Secret
metadata:
  name: news-mcp-secrets
  namespace: news-mcp
  labels:
    app: news-mcp
    component: secrets
type: Opaque
stringData:
  # Database Passwords
  POSTGRES_PASSWORD: "changeme-postgres-password"

  # Redis Password
  REDIS_PASSWORD: "changeme-redis-password"

  # RabbitMQ Password
  RABBITMQ_PASSWORD: "changeme-rabbitmq-password"

  # MinIO Secret
  MINIO_SECRET_KEY: "changeme-minio-secret"

  # JWT Secret
  JWT_SECRET_KEY: "changeme-jwt-secret-key-minimum-32-characters"

  # Service API Keys (for service-to-service auth)
  AUTH_SERVICE_API_KEY: "changeme-auth-service-key"
  FEED_SERVICE_API_KEY: "changeme-feed-service-key"
  CONTENT_ANALYSIS_SERVICE_API_KEY: "changeme-content-service-key"
  RESEARCH_SERVICE_API_KEY: "changeme-research-service-key"
  OSINT_SERVICE_API_KEY: "changeme-osint-service-key"
  NOTIFICATION_SERVICE_API_KEY: "changeme-notification-service-key"

---
# Note: In production, use Sealed Secrets or external secret management
# This is a template that should be customized per environment
